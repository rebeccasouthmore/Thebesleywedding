
<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>RSVP | The Besley Wedding</title>

    <link rel="stylesheet" href="styles.css">

</head>


<body>

<main class="invitation">

    <div class="gold-border">

        <section class="hero">

            <p class="small-script">
                Kindly Respond
            </p>


            <h1>
                RSVP
            </h1>


            <p class="welcome">
                We would be delighted to celebrate with you.
                Please let us know whether you are able to join us.
            </p>


            <form class="rsvp-form">


                <div class="guest-response">

                    <h2>
                        Guest Name
                    </h2>

                    <label>
                        <input type="radio" name="attendance">
                        Delighted to attend
                    </label>

                    <label>
                        <input type="radio" name="attendance">
                        Unable to attend
                    </label>

                </div>


                <div class="meal-section">

                    <h2>
                        Meal Choice
                    </h2>

                    <label>
                        <input type="radio" name="meal">
                        Meat
                    </label>

                    <label>
                        <input type="radio" name="meal">
                        Vegan
                    </label>

                </div>


                <div class="dietary-section">

                    <h2>
                        Dietary Requirements
                    </h2>

                    <textarea
                        placeholder="Please share any allergies or dietary requirements">
                    </textarea>

                </div>


                <button type="submit">
                    Submit RSVP
                </button>


            </form>


        </section>

    </div>

</main>


<script src="script.js"></script>

</body>

</html>
